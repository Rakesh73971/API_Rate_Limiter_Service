name: Build and Test API Rate Limiter

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: password123
          POSTGRES_DB: api_rate_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create Temporary .env File
        run: |
          touch .env
          echo "DATABASE_HOSTNAME=localhost" >> .env
          echo "DATABASE_PORT=5432" >> .env
          echo "DATABASE_PASSWORD=password123" >> .env
          echo "DATABASE_NAME=api_rate_test" >> .env
          echo "DATABASE_USERNAME=postgres" >> .env
          echo "SECRET_KEY=09d5711064a48975323a61d4f122d23b925c0d393235433" >> .env
          echo "ALGORITHM=HS256" >> .env
          echo "ACCESS_TOKEN_EXPIRE_MINUTES=30" >> .env
          echo "REDIS_HOST=localhost" >> .env
          echo "REDIS_PORT=6379" >> .env
          echo "REDIS_PASSWORD=optional_pass" >> .env

      - name: Run Pytest
        run: pytest